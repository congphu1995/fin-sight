# fin-sight as a container, joined to the shared `infra` network so Mira reaches it by name
# (http://finsight:8000/mcp) and it reaches Postgres/MinIO by name. The `infra` compose project
# must be up first (`cd ../infra && docker compose up -d`); it owns the network + the `finsight`
# database + the `finsight-reports` bucket.
name: fin-sight

networks:
  infra:
    external: true

services:
  app:
    build: .
    container_name: finsight
    restart: unless-stopped
    # env_file injects the real keys (GEMINI, MCP_AUTH_TOKEN, SSI_*). compose `environment`
    # overrides the localhost-oriented defaults to in-network service names (environment wins).
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finsight
      MINIO_ENDPOINT: minio:9000
    volumes:
      # The SSI RSA private key PEM (SSI_TRADING_PRIVATE_KEY_PATH) lives here; mounted read-only.
      - ./secrets:/app/secrets:ro
    networks:
      infra:
        aliases:
          - finsight
    # No published port: Mira reaches it container-to-container on the infra network.
    healthcheck:
      test:
        - CMD
        - .venv/bin/python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/api/v1/health")
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s # first boot runs alembic upgrade before serving

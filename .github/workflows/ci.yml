name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest tests/unit # fast tier; integration needs Postgres+MinIO

  docker:
    # Build the deployable image so a broken Dockerfile fails CI before the self-hosted
    # runner tries to deploy it. Build only (no push) — deploy builds locally on the Mac.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t fin-sight:ci .
